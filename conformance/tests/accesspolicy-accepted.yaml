apiVersion: agentic.networking.x-k8s.io/v1alpha1
kind: XAccessPolicy
metadata:
  name: test-access-policy
  namespace: agentic-conformance-infra
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: conformance-primary
  action: Allow
  rules:
    - name: allow-get-sum
      source:
        type: ServiceAccount
        serviceAccount:
          name: default
          namespace: agentic-conformance-infra
      authorization:
        type: Inline
        mcp:
          methods:
            - name: tools/call
              params:
                - "get-sum"
