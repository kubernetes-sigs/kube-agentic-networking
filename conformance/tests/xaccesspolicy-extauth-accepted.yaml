apiVersion: agentic.networking.x-k8s.io/v1alpha1
kind: XAccessPolicy
metadata:
  name: xaccesspolicy-extauth-accepted
  namespace: agentic-conformance-infra
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: conformance-primary
  action: ExternalAuth
  externalAuth:
    externalAuthProtocol: gRPC
    backendRef:
      group: ""
      kind: Service
      name: ext-auth-svc
      port: 50051
    gRPCAuthConfig: {}
  rules:
    - name: allow-default
      source:
        type: ServiceAccount
        serviceAccount:
          name: default
          namespace: agentic-conformance-infra
