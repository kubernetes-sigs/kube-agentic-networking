apiVersion: agentic.networking.x-k8s.io/v1alpha1
kind: XAccessPolicy
metadata:
  name: xaccesspolicy-sa-matching
  namespace: agentic-conformance-infra
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: conformance-primary
  action: Allow
  rules:
    - name: allow-tester-sa
      source:
        type: ServiceAccount
        serviceAccount:
          name: conformance-tester-sa
          namespace: agentic-conformance-infra
      authorization:
        type: Inline
        mcp:
          mcpBaseProtocolMethodsOption: MATCH_BASE_PROTOCOL_METHODS
          methods:
            - name: tools/call
              params:
                - "get-sum"
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: conformance-route
  namespace: agentic-conformance-infra
spec:
  parentRefs:
    - name: conformance-primary
      namespace: agentic-conformance-infra
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /mcp
      backendRefs:
        - name: conformance-mcp-backend-svc
          port: 3001
