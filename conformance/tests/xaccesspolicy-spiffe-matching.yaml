apiVersion: agentic.networking.x-k8s.io/v1alpha1
kind: XAccessPolicy
metadata:
  name: xaccesspolicy-spiffe-matching
  namespace: agentic-conformance-infra
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: conformance-primary
  action: Allow
  rules:
    - name: allow-tester-spiffe
      source:
        type: SPIFFE
        spiffe: spiffe://cluster.local/ns/agentic-conformance-infra/sa/conformance-tester-sa
      authorization:
        type: Inline
        mcp:
          mcpBaseProtocolMethodsOption: MATCH_BASE_PROTOCOL_METHODS
          methods:
            - name: tools/call
              params:
                - "get-sum"
