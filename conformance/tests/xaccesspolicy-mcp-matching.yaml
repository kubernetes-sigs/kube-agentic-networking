apiVersion: agentic.networking.x-k8s.io/v1alpha1
kind: XAccessPolicy
metadata:
  name: xaccesspolicy-mcp-matching
  namespace: agentic-conformance-infra
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: conformance-primary
  action: Allow
  rules:
    - name: allow-mcp-subset
      source:
        type: ServiceAccount
        serviceAccount:
          name: conformance-tester-sa
          namespace: agentic-conformance-infra
      authorization:
        type: Inline
        mcp:
          mcpBaseProtocolMethodsOption: MATCH_BASE_PROTOCOL_METHODS
          methods:
            - name: tools/call
              params:
                - "get-sum"
            - name: prompts
            - name: resources/list
