apiVersion: agentic.networking.x-k8s.io/v1alpha1
kind: XAccessPolicy
metadata:
  name: xaccesspolicy-base-protocol-match
  namespace: agentic-conformance-infra
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: conformance-primary
  action: Allow
  rules:
    - name: allow-tester-base
      source:
        type: ServiceAccount
        serviceAccount:
          name: conformance-tester-sa
          namespace: agentic-conformance-infra
      authorization:
        type: Inline
        mcp:
          mcpBaseProtocolMethodsOption: MATCH_BASE_PROTOCOL_METHODS
