# Tempo deployment for trace storage and querying.
# Receives spans from the OTel collector and serves them to Grafana.
# Uses local (ephemeral) storage — traces are lost on pod restart.

---
# Tempo server configuration: single-node mode with local storage
apiVersion: v1
kind: ConfigMap
metadata:
  name: tempo-config
  namespace: quickstart-ns
data:
  tempo.yaml: |
    server:
      http_listen_port: 3200
      log_level: info

    distributor:
      receivers:
        otlp:
          protocols:
            grpc:
              endpoint: 0.0.0.0:4317
            http:
              endpoint: 0.0.0.0:4318

    ingester:
      max_block_duration: 5m

    compactor:
      compaction:
        block_retention: 1h

    storage:
      trace:
        backend: local
        local:
          path: /tmp/tempo/blocks
        wal:
          path: /tmp/tempo/wal

    query_frontend:
      search:
        duration_slo: 5s
        throughput_bytes_slo: 1.073741824e+09
      trace_by_id:
        duration_slo: 5s

---
apiVersion: v1
kind: Service
metadata:
  name: tempo
  namespace: quickstart-ns
  labels:
    app: tempo
spec:
  type: ClusterIP
  ports:
    - name: tempo-http
      port: 3200
      targetPort: 3200
      protocol: TCP
    - name: otlp-grpc
      port: 4317
      targetPort: 4317
      protocol: TCP
    - name: otlp-http
      port: 4318
      targetPort: 4318
      protocol: TCP
  selector:
    app: tempo

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: tempo
  namespace: quickstart-ns
  labels:
    app: tempo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tempo
  template:
    metadata:
      labels:
        app: tempo
    spec:
      containers:
      - name: tempo
        image: grafana/tempo:2.3.1
        args:
          - "-config.file=/etc/tempo/tempo.yaml"
        ports:
          - containerPort: 3200
            name: tempo-http
            protocol: TCP
          - containerPort: 4317
            name: otlp-grpc
            protocol: TCP
          - containerPort: 4318
            name: otlp-http
            protocol: TCP
        volumeMounts:
          - name: tempo-config
            mountPath: /etc/tempo
          - name: tempo-storage
            mountPath: /tmp/tempo
        resources:
          limits:
            memory: "1Gi"
            cpu: "500m"
          requests:
            memory: "512Mi"
            cpu: "200m"
        readinessProbe:
          httpGet:
            path: /ready
            port: 3200
          initialDelaySeconds: 10
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /ready
            port: 3200
          initialDelaySeconds: 30
          periodSeconds: 20
      volumes:
        - name: tempo-config
          configMap:
            name: tempo-config
        - name: tempo-storage
          emptyDir: {}
