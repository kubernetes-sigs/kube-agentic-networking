---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: quickstart-ns
data:
  datasources.yaml: |
    apiVersion: 1
    datasources:
      - name: Tempo
        type: tempo
        access: proxy
        url: http://tempo.quickstart-ns.svc.cluster.local:3200
        uid: tempo
        isDefault: true
        editable: true
        jsonData:
          httpMethod: GET
          tracesToLogs:
            datasourceUid: 'loki'
          serviceMap:
            datasourceUid: 'prometheus'
          nodeGraph:
            enabled: true

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-config
  namespace: quickstart-ns
data:
  grafana.ini: |
    [analytics]
    check_for_updates = false
    reporting_enabled = false

    [auth.anonymous]
    enabled = true
    org_role = Admin

    [security]
    admin_user = admin
    admin_password = admin

    [users]
    default_theme = dark

---
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: quickstart-ns
  labels:
    app: grafana
spec:
  type: ClusterIP
  ports:
    - name: grafana-ui
      port: 3000
      targetPort: 3000
      protocol: TCP
  selector:
    app: grafana

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: quickstart-ns
  labels:
    app: grafana
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      containers:
      - name: grafana
        image: grafana/grafana:10.2.3
        ports:
          - containerPort: 3000
            name: grafana-ui
            protocol: TCP
        env:
          - name: GF_PATHS_CONFIG
            value: /etc/grafana/grafana.ini
          - name: GF_PATHS_PROVISIONING
            value: /etc/grafana/provisioning
        volumeMounts:
          - name: grafana-config
            mountPath: /etc/grafana
          - name: grafana-datasources
            mountPath: /etc/grafana/provisioning/datasources
          - name: grafana-storage
            mountPath: /var/lib/grafana
        resources:
          limits:
            memory: "512Mi"
            cpu: "500m"
          requests:
            memory: "256Mi"
            cpu: "100m"
        readinessProbe:
          httpGet:
            path: /api/health
            port: 3000
          initialDelaySeconds: 10
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /api/health
            port: 3000
          initialDelaySeconds: 30
          periodSeconds: 20
      volumes:
        - name: grafana-config
          configMap:
            name: grafana-config
        - name: grafana-datasources
          configMap:
            name: grafana-datasources
        - name: grafana-storage
          emptyDir: {}