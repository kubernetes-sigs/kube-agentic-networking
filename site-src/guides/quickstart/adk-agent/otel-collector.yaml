# OpenTelemetry Collector deployment for processing traces from the agent and gateway.
# Receives OTLP spans, derives authorization decision attributes from shadow RBAC
# metadata, and exports to Tempo for visualization in Grafana.

---
# Collector pipeline configuration: OTLP receiver → transform processor → Tempo exporter
apiVersion: v1
kind: ConfigMap
metadata:
  name: otel-collector-config
  namespace: quickstart-ns
data:
  base.yaml: |
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318

    processors:
      memory_limiter:
        check_interval: 1s
        limit_mib: 1000

      batch: {}

      # Add resource attributes from Kubernetes
      resource:
        attributes:
          - key: service.namespace
            from_attribute: k8s.namespace.name
            action: upsert
          - key: service.instance.id
            from_attribute: k8s.pod.name
            action: upsert

      # Derive authorization decision attributes from shadow RBAC metadata.
      # security_rule.name is set by Envoy when a shadow rule matches; empty otherwise.
      # event.action (allow/deny) is only set for tools/call — other MCP methods
      # (initialize, tools/list) are unconditionally allowed by built-in rules.
      transform:
        error_mode: ignore
        trace_statements:
          - context: span
            statements:
              # Whether a named access policy rule matched this request
              - set(attributes["security_rule.match"], true) where attributes["security_rule.name"] != nil and attributes["security_rule.name"] != ""
              - set(attributes["security_rule.match"], false) where attributes["security_rule.name"] == nil or attributes["security_rule.name"] == ""
              # Authorization decision (only meaningful for tool calls)
              - set(attributes["event.action"], "allow") where attributes["security_rule.match"] == true
              - set(attributes["event.action"], "deny") where attributes["security_rule.match"] == false and attributes["mcp.method.name"] == "tools/call"
              # RBAC check completed successfully
              - set(attributes["event.outcome"], "success") where attributes["security_rule.name"] != nil and attributes["security_rule.name"] != ""
              # ECS event classification for tool call authorization
              - set(attributes["event.kind"], "event") where attributes["security_rule.name"] != nil and attributes["mcp.method.name"] == "tools/call"
              - set(attributes["event.category"], ["authorization"]) where attributes["mcp.method.name"] == "tools/call"
              - set(attributes["component"], "envoy.gateway") where name == "ingress"

    exporters:
      debug:
        verbosity: detailed

      # Export to Tempo in quickstart-ns for Grafana visualization
      otlp/tempo:
        endpoint: tempo.quickstart-ns.svc.cluster.local:4317
        tls:
          insecure: true

    extensions:
      health_check: {}

    service:
      extensions: [health_check]
      pipelines:
        traces:
          receivers: [otlp]
          processors: [memory_limiter, resource, transform, batch]
          exporters: [debug, otlp/tempo]

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: otel-collector
  namespace: quickstart-ns
spec:
  replicas: 1
  selector:
    matchLabels:
      app: otel-collector
  template:
    metadata:
      labels:
        app: otel-collector
    spec:
      containers:
      - name: otel-collector
        image: otel/opentelemetry-collector-contrib:0.122.1
        command:
          - "/otelcol-contrib"
          - "--config=/etc/otelcol-config/base.yaml"
        ports:
        - containerPort: 4317
          name: otlp-grpc
        - containerPort: 4318
          name: otlp-http
        volumeMounts:
        - name: otel-collector-config
          mountPath: /etc/otelcol-config
        resources:
          limits:
            memory: "512Mi"
            cpu: "500m"
          requests:
            memory: "256Mi"
            cpu: "200m"
      volumes:
      - name: otel-collector-config
        configMap:
          name: otel-collector-config

---
apiVersion: v1
kind: Service
metadata:
  name: otel-collector
  namespace: quickstart-ns
spec:
  type: ClusterIP
  ports:
  - port: 4317
    targetPort: 4317
    protocol: TCP
    name: otlp-grpc
  - port: 4318
    targetPort: 4318
    protocol: TCP
    name: otlp-http
  selector:
    app: otel-collector
