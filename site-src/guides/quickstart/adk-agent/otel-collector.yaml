---
apiVersion: v1
kind: ConfigMap
metadata:
  name: otel-collector-config
  namespace: quickstart-ns
data:
  base.yaml: |
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318

    processors:
      memory_limiter:
        check_interval: 1s
        limit_mib: 1000

      batch: {}

      # Add resource attributes from Kubernetes
      resource:
        attributes:
          - key: service.namespace
            from_attribute: k8s.namespace.name
            action: upsert
          - key: service.instance.id
            from_attribute: k8s.pod.name
            action: upsert

      # Transform spans to add semantic attributes
      transform:
        error_mode: ignore
        trace_statements:
          - context: span
            statements:
              # Mark RBAC-related spans
              - set(attributes["component"], "envoy.rbac") where name == "envoy.filters.http.rbac"
              # Add event kind for security events
              - set(attributes["event.kind"], "event") where attributes["event.action"] != nil
              # Categorize security events
              - set(attributes["event.category"], ["authentication", "authorization"]) where attributes["security_rule.name"] != nil

    exporters:
      debug:
        verbosity: detailed

      # Export to the Phoenix instance in kagenti-system
      otlp/phoenix:
        endpoint: phoenix.kagenti-system.svc.cluster.local:4317
        tls:
          insecure: true

    extensions:
      health_check: {}

    service:
      extensions: [health_check]
      pipelines:
        traces:
          receivers: [otlp]
          processors: [memory_limiter, resource, transform, batch]
          exporters: [debug, otlp/phoenix]

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: otel-collector
  namespace: quickstart-ns
spec:
  replicas: 1
  selector:
    matchLabels:
      app: otel-collector
  template:
    metadata:
      labels:
        app: otel-collector
    spec:
      containers:
      - name: otel-collector
        image: otel/opentelemetry-collector-contrib:0.122.1
        command:
          - "/otelcol-contrib"
          - "--config=/etc/otelcol-config/base.yaml"
        ports:
        - containerPort: 4317
          name: otlp-grpc
        - containerPort: 4318
          name: otlp-http
        volumeMounts:
        - name: otel-collector-config
          mountPath: /etc/otelcol-config
        resources:
          limits:
            memory: "512Mi"
            cpu: "500m"
          requests:
            memory: "256Mi"
            cpu: "200m"
      volumes:
      - name: otel-collector-config
        configMap:
          name: otel-collector-config

---
apiVersion: v1
kind: Service
metadata:
  name: otel-collector
  namespace: quickstart-ns
spec:
  type: ClusterIP
  ports:
  - port: 4317
    targetPort: 4317
    protocol: TCP
    name: otlp-grpc
  - port: 4318
    targetPort: 4318
    protocol: TCP
    name: otlp-http
  selector:
    app: otel-collector
