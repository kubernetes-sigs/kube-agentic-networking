---
apiVersion: v1
kind: ConfigMap
metadata:
  name: otel-collector-config
  namespace: quickstart-ns
data:
  base.yaml: |
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318

    processors:
      memory_limiter:
        check_interval: 1s
        limit_mib: 1000

      batch: {}

      # Add resource attributes from Kubernetes
      resource:
        attributes:
          - key: service.namespace
            from_attribute: k8s.namespace.name
            action: upsert
          - key: service.instance.id
            from_attribute: k8s.pod.name
            action: upsert

      # Transform spans to add semantic attributes
      transform:
        error_mode: ignore
        trace_statements:
          - context: span
            statements:
              # Normalize event.action from enforcement RBAC engine result ("allowed"/"denied" -> "allow"/"deny")
              # event.action reflects the decision the policy rule would take, not whether the HTTP call succeeded.
              - set(attributes["event.action"], "allow") where attributes["event.action"] == "allowed"
              - set(attributes["event.action"], "deny") where attributes["event.action"] == "denied"

              # Derive event.outcome from HTTP status code (success/failure of the individual request)
              # 2xx = success, 4xx/5xx = failure
              - set(attributes["event.outcome"], "success") where attributes["http.status_code"] != nil and Int(attributes["http.status_code"]) >= 200 and Int(attributes["http.status_code"]) < 300
              - set(attributes["event.outcome"], "failure") where attributes["http.status_code"] != nil and Int(attributes["http.status_code"]) >= 400

              # Derive security_rule.match boolean from shadow_effective_policy_id.
              # A catch-all shadow rule "__no_match__" fires only when no named policy rule matches.
              - set(attributes["security_rule.match"], true) where attributes["security_rule.name"] != nil and attributes["security_rule.name"] != "" and attributes["security_rule.name"] != "__no_match__"
              - set(attributes["security_rule.match"], false) where attributes["security_rule.name"] == "__no_match__"
              - set(attributes["security_rule.match"], false) where attributes["security_rule.name"] == nil or attributes["security_rule.name"] == ""

              # Add event kind for security events (when we have RBAC evaluation)
              - set(attributes["event.kind"], "event") where attributes["security_rule.name"] != nil

              # Categorize as authorization events for tool calls
              - set(attributes["event.category"], ["authorization"]) where attributes["mcp.method.name"] == "tools/call"

              # Mark gateway spans with component attribute
              - set(attributes["component"], "envoy.gateway") where name == "ingress"

    exporters:
      debug:
        verbosity: detailed

      # Export to Tempo in quickstart-ns for Grafana visualization
      otlp/tempo:
        endpoint: tempo.quickstart-ns.svc.cluster.local:4317
        tls:
          insecure: true

    extensions:
      health_check: {}

    service:
      extensions: [health_check]
      pipelines:
        traces:
          receivers: [otlp]
          processors: [memory_limiter, resource, transform, batch]
          exporters: [debug, otlp/tempo]

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: otel-collector
  namespace: quickstart-ns
spec:
  replicas: 1
  selector:
    matchLabels:
      app: otel-collector
  template:
    metadata:
      labels:
        app: otel-collector
    spec:
      containers:
      - name: otel-collector
        image: otel/opentelemetry-collector-contrib:0.122.1
        command:
          - "/otelcol-contrib"
          - "--config=/etc/otelcol-config/base.yaml"
        ports:
        - containerPort: 4317
          name: otlp-grpc
        - containerPort: 4318
          name: otlp-http
        volumeMounts:
        - name: otel-collector-config
          mountPath: /etc/otelcol-config
        resources:
          limits:
            memory: "512Mi"
            cpu: "500m"
          requests:
            memory: "256Mi"
            cpu: "200m"
      volumes:
      - name: otel-collector-config
        configMap:
          name: otel-collector-config

---
apiVersion: v1
kind: Service
metadata:
  name: otel-collector
  namespace: quickstart-ns
spec:
  type: ClusterIP
  ports:
  - port: 4317
    targetPort: 4317
    protocol: TCP
    name: otlp-grpc
  - port: 4318
    targetPort: 4318
    protocol: TCP
    name: otlp-http
  selector:
    app: otel-collector
