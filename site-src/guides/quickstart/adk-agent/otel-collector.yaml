---
apiVersion: v1
kind: ConfigMap
metadata:
  name: otel-collector-config
  namespace: quickstart-ns
data:
  base.yaml: |
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318

    processors:
      memory_limiter:
        check_interval: 1s
        limit_mib: 1000

      batch: {}

      # Add resource attributes from Kubernetes
      resource:
        attributes:
          - key: service.namespace
            from_attribute: k8s.namespace.name
            action: upsert
          - key: service.instance.id
            from_attribute: k8s.pod.name
            action: upsert

      # Transform spans to add semantic attributes derived from security_rule.name.
      # security_rule.name is set by Envoy's shadow RBAC custom tag:
      #   - a named rule name when a policy rule matched
      #   - "" (empty/absent) when no named rule matched
      #   - "" or absent for non-RBAC spans (e.g. initialize, tools/list)
      #
      # Proposal 33 definitions:
      #   security_rule.match: whether a named rule matched (true/false)
      #   event.action:        action the policy took (allow/deny) — enforcement decision
      #   event.outcome:       outcome of the check itself (success/failure) — did RBAC run successfully
      transform:
        error_mode: ignore
        trace_statements:
          - context: span
            statements:
              # security_rule.match: true if a named shadow rule matched (shadow_effective_policy_id is set).
              # false if no named rule matched — Envoy leaves shadow_effective_policy_id unset (empty).
              # Note: there is no catch-all shadow rule. A catch-all in a protobuf map<string,Policy>
              # has no ordering guarantee and would shadow named rules, defeating its purpose.
              - set(attributes["security_rule.match"], true) where attributes["security_rule.name"] != nil and attributes["security_rule.name"] != ""
              - set(attributes["security_rule.match"], false) where attributes["security_rule.name"] == nil or attributes["security_rule.name"] == ""

              # event.action: the enforcement decision.
              # Named rule matched → enforcement allowed it (all policy rules are allow-type).
              # No named rule matched (empty security_rule.name) → deny by default.
              - set(attributes["event.action"], "allow") where attributes["security_rule.match"] == true
              - set(attributes["event.action"], "deny") where attributes["security_rule.match"] == false

              # event.outcome: outcome of the RBAC check itself (proposal 33: "outcome of the check itself").
              # The check always succeeds when security_rule.name is set (RBAC evaluated and returned a decision).
              # This is distinct from event.action (the decision) and from the HTTP response status.
              - set(attributes["event.outcome"], "success") where attributes["security_rule.name"] != nil and attributes["security_rule.name"] != ""

              # Add event kind for security events (when we have RBAC evaluation)
              - set(attributes["event.kind"], "event") where attributes["security_rule.name"] != nil

              # Categorize as authorization events for tool calls
              - set(attributes["event.category"], ["authorization"]) where attributes["mcp.method.name"] == "tools/call"

              # Mark gateway spans with component attribute
              - set(attributes["component"], "envoy.gateway") where name == "ingress"

    exporters:
      debug:
        verbosity: detailed

      # Export to Tempo in quickstart-ns for Grafana visualization
      otlp/tempo:
        endpoint: tempo.quickstart-ns.svc.cluster.local:4317
        tls:
          insecure: true

    extensions:
      health_check: {}

    service:
      extensions: [health_check]
      pipelines:
        traces:
          receivers: [otlp]
          processors: [memory_limiter, resource, transform, batch]
          exporters: [debug, otlp/tempo]

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: otel-collector
  namespace: quickstart-ns
spec:
  replicas: 1
  selector:
    matchLabels:
      app: otel-collector
  template:
    metadata:
      labels:
        app: otel-collector
    spec:
      containers:
      - name: otel-collector
        image: otel/opentelemetry-collector-contrib:0.122.1
        command:
          - "/otelcol-contrib"
          - "--config=/etc/otelcol-config/base.yaml"
        ports:
        - containerPort: 4317
          name: otlp-grpc
        - containerPort: 4318
          name: otlp-http
        volumeMounts:
        - name: otel-collector-config
          mountPath: /etc/otelcol-config
        resources:
          limits:
            memory: "512Mi"
            cpu: "500m"
          requests:
            memory: "256Mi"
            cpu: "200m"
      volumes:
      - name: otel-collector-config
        configMap:
          name: otel-collector-config

---
apiVersion: v1
kind: Service
metadata:
  name: otel-collector
  namespace: quickstart-ns
spec:
  type: ClusterIP
  ports:
  - port: 4317
    targetPort: 4317
    protocol: TCP
    name: otlp-grpc
  - port: 4318
    targetPort: 4318
    protocol: TCP
    name: otlp-http
  selector:
    app: otel-collector
