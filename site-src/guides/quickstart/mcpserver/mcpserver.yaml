apiVersion: mcp.x-k8s.io/v1alpha1
kind: MCPServer
metadata:
  name: mcp-everything
  namespace: quickstart-ns
spec:
  source:
    type: ContainerImage
    containerImage:
      ref: us-central1-docker.pkg.dev/k8s-staging-images/agentic-net/quickstart-everything-mcp:main
  config:
    port: 3001
    path: /mcp
    env:
      - name: PORT
        value: "3001"
  runtime:
    security:
      securityContext:
        readOnlyRootFilesystem: false
