apiVersion: agentic.networking.x-k8s.io/v1alpha1
kind: XAccessPolicy
metadata:
  name: valid-policy
spec:
  targetRefs:
  - group: agentic.networking.x-k8s.io
    kind: XBackend
    name: valid-backend
  action: ExternalAuth
  externalAuth:
    protocol: GRPC
    backendRef:
      name: ext-authz-svc
      port: 5000
    grpc: {}
  rules:
  - name: spiffe-triggers-ext-authz
    source:
      type: SPIFFE
      spiffe: spiffe://example.com/my-service
