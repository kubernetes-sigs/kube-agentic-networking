apiVersion: agentic.prototype.x-k8s.io/v0alpha0
kind: XAccessPolicy
metadata:
  name: cel-policy
  namespace: default
spec:
  targetRefs:
  - group: agentic.prototype.x-k8s.io
    kind: XBackend
    name: my-backend
  rules:
  - name: allow-verify-tools
    source:
      type: ServiceAccount
      serviceAccount:
        name: my-agent
    authorization:
      type: CEL
      cel:
        expression: "request.mcp.tool_name.startsWith('verify_')"
