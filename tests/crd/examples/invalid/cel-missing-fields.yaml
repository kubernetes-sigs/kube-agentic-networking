apiVersion: agentic.prototype.x-k8s.io/v0alpha0
kind: XAccessPolicy
metadata:
  name: cel-missing-fields
  namespace: default
spec:
  targetRefs:
  - group: agentic.prototype.x-k8s.io
    kind: XBackend
    name: my-backend
  rules:
  - name: invalid-cel
    source:
      type: ServiceAccount
      serviceAccount:
        name: my-agent
    authorization:
      type: CEL
      # missing cel field
