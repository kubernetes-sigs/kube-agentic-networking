apiVersion: agentic.networking.x-k8s.io/v1alpha1
kind: XAccessPolicy
metadata:
  name: cel-missing-fields
  namespace: default
spec:
  targetRefs:
  - group: agentic.networking.x-k8s.io
    kind: XBackend
    name: my-backend
  action: Allow
  rules:
  - name: invalid-cel
    source:
      type: ServiceAccount
      serviceAccount:
        name: my-agent
    authorization:
      type: CEL
      # missing cel field
