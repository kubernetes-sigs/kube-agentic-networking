apiVersion: agentic.networking.x-k8s.io/v1alpha1
kind: XAccessPolicy
metadata:
  name: policy-v1alpha1-invalid-mcp-method-params
spec:
  targetRefs:
  - group: gateway.networking.k8s.io
    kind: Gateway
    name: my-gateway
  action: Allow
  rules:
  - name: allow-sa
    source:
      type: ServiceAccount
      serviceAccount:
        name: my-sa
    authorization:
      type: Inline
      mcp:
        methods:
        - name: prompts/list
          params:
          - disallowedParam
