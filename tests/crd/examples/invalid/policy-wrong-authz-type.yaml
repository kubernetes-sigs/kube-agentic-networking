apiVersion: agentic.networking.x-k8s.io/v1alpha1
kind: XAccessPolicy
metadata:
  name: invalid-policy-wrong-authz-type
spec:
  targetRefs:
  - group: agentic.networking.x-k8s.io
    kind: XBackend
    name: valid-backend
  action: Allow
  rules:
  - name: authorized-tools
    source:
      type: ServiceAccount
      serviceAccount:
        name: default
    authorization:
      type: InvalidTypeEnum # This will be rejected by CRD validation
      mcp: {}
