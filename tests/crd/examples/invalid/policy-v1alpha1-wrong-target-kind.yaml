apiVersion: agentic.networking.x-k8s.io/v1alpha1
kind: XAccessPolicy
metadata:
  name: policy-v1alpha1-wrong-target-kind
spec:
  targetRefs:
  - group: gateway.networking.k8s.io
    kind: Gateway
    name: my-gateway
  - group: agentic.networking.x-k8s.io
    kind: XBackend
    name: my-backend
  action: Allow
  rules:
  - name: allow-sa
    source:
      type: ServiceAccount
      serviceAccount:
        name: my-sa
