apiVersion: agentic.networking.x-k8s.io/v1alpha1
kind: XAccessPolicy
metadata:
  name: e2e-backend-level-policy
  namespace: e2e-test-ns
spec:
  targetRefs:
    - group: agentic.networking.x-k8s.io
      kind: XBackend
      name: e2e-mcp-backend
  action: Allow
  rules:
    - name: allow-get-sum
      source:
        type: ServiceAccount
        serviceAccount:
          name: e2e-tester-sa
          namespace: e2e-test-ns
      authorization:
        type: Inline
        mcp:
          methods:
            - name: tools/call
              params:
                - "get-sum"
