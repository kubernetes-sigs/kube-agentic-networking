apiVersion: agentic.networking.x-k8s.io/v1alpha1
kind: XAccessPolicy
metadata:
  name: e2e-cel-policy
  namespace: e2e-test-ns
spec:
  targetRefs:
  - group: agentic.networking.x-k8s.io
    kind: XBackend
    name: e2e-mcp-backend
  action: Allow
  rules:
  - name: allow-get-sum-only
    source:
      type: ServiceAccount
      serviceAccount:
        name: e2e-tester-sa
    authorization:
      type: CEL
      cel:
        expression: "request.mcp.tool_name == 'get-sum'"
