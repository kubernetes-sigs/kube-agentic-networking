apiVersion: agentic.prototype.x-k8s.io/v0alpha0
kind: XAccessPolicy
metadata:
  name: e2e-gateway-policy-echo
  namespace: e2e-test-ns
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: e2e-gateway
  rules:
    - name: allow-echo
      source:
        type: ServiceAccount
        serviceAccount:
          name: e2e-tester-sa
          namespace: e2e-test-ns
      authorization:
        type: InlineTools
        tools:
          - "echo"
