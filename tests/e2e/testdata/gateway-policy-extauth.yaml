apiVersion: agentic.networking.x-k8s.io/v0alpha0
kind: XAccessPolicy
metadata:
  name: e2e-gateway-extauth-policy
  namespace: e2e-test-ns
spec:
  targetRefs:
  - group: gateway.networking.k8s.io
    kind: Gateway
    name: e2e-gateway
  rules:
  - name: ext-authz-rule
    source:
      type: ServiceAccount
    authorization:
      type: ExternalAuth
      externalAuth:
        backendRef:
          kind: Service
          name: authorino
          namespace: e2e-test-ns
          port: 50051
        protocol: GRPC
        grpc: {}
