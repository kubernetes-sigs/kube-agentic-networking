apiVersion: agentic.networking.x-k8s.io/v1alpha1
kind: XAccessPolicy
metadata:
  name: e2e-gateway-extauth-policy
  namespace: e2e-test-ns
spec:
  targetRefs:
  - group: gateway.networking.k8s.io
    kind: Gateway
    name: e2e-gateway
  action: ExternalAuth
  externalAuth:
    backendRef:
      kind: Service
      name: authorino
      namespace: e2e-test-ns
      port: 50051
    protocol: GRPC
    grpc: {}
  rules:
  - name: ext-authz-rule-1
    source:
      type: ServiceAccount
      serviceAccount:
        name: e2e-tester-sa
        namespace: e2e-test-ns
  - name: ext-authz-rule-2
    source:
      type: ServiceAccount
      serviceAccount:
        name: e2e-tester-2-sa
        namespace: e2e-test-ns
