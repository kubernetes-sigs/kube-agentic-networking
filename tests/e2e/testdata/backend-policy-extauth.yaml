apiVersion: agentic.networking.x-k8s.io/v0alpha0
kind: XAccessPolicy
metadata:
  name: e2e-backend-combined-policy
  namespace: e2e-test-ns
spec:
  targetRefs:
    - group: agentic.networking.x-k8s.io
      kind: XBackend
      name: e2e-mcp-backend
  rules:
    - name: inline-tools-for-tester-sa
      source:
        type: ServiceAccount
        serviceAccount:
          name: e2e-tester-sa
          namespace: e2e-test-ns
      authorization:
        type: InlineTools
        tools:
          - "echo"
          - "get-sum"
    - name: external-auth-for-tester-2-sa
      source:
        type: ServiceAccount
        serviceAccount:
          name: e2e-tester-2-sa
          namespace: e2e-test-ns
      authorization:
        type: ExternalAuth
        externalAuth:
          backendRef:
            kind: Service
            name: authorino
            namespace: e2e-test-ns
            port: 50051
          protocol: GRPC
          grpc: {}
