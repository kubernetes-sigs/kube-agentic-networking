---
apiVersion: v1
kind: ConfigMap
metadata:
  name: otel-collector-config
  namespace: team1
data:
  otel-collector-config.yaml: |
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318

    processors:
      batch:
        timeout: 10s
        send_batch_size: 1024

      memory_limiter:
        check_interval: 1s
        limit_mib: 512

    exporters:
      # Export to console for debugging
      logging:
        loglevel: debug

      # Export to Jaeger (optional - uncomment if you have Jaeger running)
      # otlp/jaeger:
      #   endpoint: jaeger-collector:4317
      #   tls:
      #     insecure: true

      # Export to Prometheus (optional - uncomment if you have Prometheus)
      # prometheus:
      #   endpoint: "0.0.0.0:8889"

    service:
      pipelines:
        traces:
          receivers: [otlp]
          processors: [memory_limiter, batch]
          exporters: [logging]

        metrics:
          receivers: [otlp]
          processors: [memory_limiter, batch]
          exporters: [logging]

        logs:
          receivers: [otlp]
          processors: [memory_limiter, batch]
          exporters: [logging]

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: otel-collector
  namespace: team1
spec:
  replicas: 1
  selector:
    matchLabels:
      app: otel-collector
  template:
    metadata:
      labels:
        app: otel-collector
    spec:
      containers:
      - name: otel-collector
        image: otel/opentelemetry-collector:latest
        command:
          - "/otelcol"
          - "--config=/conf/otel-collector-config.yaml"
        ports:
        - containerPort: 4317  # OTLP gRPC receiver
          name: otlp-grpc
        - containerPort: 4318  # OTLP HTTP receiver
          name: otlp-http
        - containerPort: 8889  # Prometheus metrics exporter
          name: prometheus
        volumeMounts:
        - name: otel-collector-config
          mountPath: /conf
        resources:
          limits:
            memory: "512Mi"
            cpu: "500m"
          requests:
            memory: "256Mi"
            cpu: "200m"
      volumes:
      - name: otel-collector-config
        configMap:
          name: otel-collector-config
          items:
          - key: otel-collector-config.yaml
            path: otel-collector-config.yaml

---
apiVersion: v1
kind: Service
metadata:
  name: otel-collector
  namespace: team1
spec:
  type: ClusterIP
  ports:
  - port: 4317
    targetPort: 4317
    protocol: TCP
    name: otlp-grpc
  - port: 4318
    targetPort: 4318
    protocol: TCP
    name: otlp-http
  - port: 8889
    targetPort: 8889
    protocol: TCP
    name: prometheus
  selector:
    app: otel-collector
