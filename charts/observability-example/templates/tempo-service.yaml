{{- if .Values.tempo.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: tempo
  labels:
    app: tempo
    {{- include "observability-example.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - name: tempo-http
      port: 3200
      targetPort: 3200
      protocol: TCP
    - name: otlp-grpc
      port: 4317
      targetPort: 4317
      protocol: TCP
    - name: otlp-http
      port: 4318
      targetPort: 4318
      protocol: TCP
  selector:
    app: tempo
{{- end }}
