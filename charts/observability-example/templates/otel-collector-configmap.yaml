{{- if .Values.collector.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: otel-collector-config
  labels:
    app: otel-collector
    {{- include "observability-example.labels" . | nindent 4 }}
data:
  base.yaml: |
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318

    processors:
      memory_limiter:
        check_interval: 1s
        limit_mib: 1000

      batch: {}

      resource:
        attributes:
          - key: service.namespace
            from_attribute: k8s.namespace.name
            action: upsert
          - key: service.instance.id
            from_attribute: k8s.pod.name
            action: upsert

      # Derive authorization decision attributes from shadow RBAC metadata.
      transform:
        error_mode: ignore
        trace_statements:
          - context: span
            statements:
              - set(attributes["security_rule.match"], true) where attributes["security_rule.name"] != nil and attributes["security_rule.name"] != ""
              - set(attributes["security_rule.match"], false) where attributes["security_rule.name"] == nil or attributes["security_rule.name"] == ""
              - set(attributes["event.action"], "allow") where attributes["security_rule.match"] == true
              - set(attributes["event.action"], "deny") where attributes["security_rule.match"] == false and attributes["mcp.method.name"] == "tools/call"
              - set(attributes["event.outcome"], "success") where attributes["security_rule.name"] != nil and attributes["security_rule.name"] != ""
              - set(attributes["event.kind"], "event") where attributes["security_rule.name"] != nil and attributes["mcp.method.name"] == "tools/call"
              - set(attributes["event.category"], ["authorization"]) where attributes["mcp.method.name"] == "tools/call"
              - set(attributes["component"], "envoy.gateway") where name == "ingress"

    exporters:
      debug:
        verbosity: detailed

      otlp/tempo:
        endpoint: {{ include "observability-example.tempoEndpoint" . }}
        tls:
          insecure: true

    extensions:
      health_check: {}

    service:
      extensions: [health_check]
      pipelines:
        traces:
          receivers: [otlp]
          processors: [memory_limiter, resource, transform, batch]
          exporters: [debug, otlp/tempo]
{{- end }}
