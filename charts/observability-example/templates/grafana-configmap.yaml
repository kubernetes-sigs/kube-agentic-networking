{{- if .Values.grafana.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  labels:
    app: grafana
    {{- include "observability-example.labels" . | nindent 4 }}
data:
  datasources.yaml: |
    apiVersion: 1
    datasources:
      - name: Tempo
        type: tempo
        access: proxy
        url: http://tempo.{{ .Release.Namespace }}.svc.cluster.local:3200
        uid: tempo
        isDefault: true
        editable: true
        jsonData:
          httpMethod: GET
          tracesToLogs:
            datasourceUid: 'loki'
          serviceMap:
            datasourceUid: 'prometheus'
          nodeGraph:
            enabled: true
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-config
  labels:
    app: grafana
    {{- include "observability-example.labels" . | nindent 4 }}
data:
  grafana.ini: |
    [analytics]
    check_for_updates = false
    reporting_enabled = false

    [auth.anonymous]
    enabled = true
    org_role = Admin

    [security]
    admin_user = {{ .Values.grafana.adminUser }}
    admin_password = {{ .Values.grafana.adminPassword }}

    [users]
    default_theme = dark
{{- end }}
