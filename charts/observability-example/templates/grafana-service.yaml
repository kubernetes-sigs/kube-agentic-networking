{{- if .Values.grafana.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: grafana
  labels:
    app: grafana
    {{- include "observability-example.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - name: grafana-ui
      port: 3000
      targetPort: 3000
      protocol: TCP
  selector:
    app: grafana
{{- end }}
