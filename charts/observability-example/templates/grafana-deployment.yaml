{{- if .Values.grafana.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  labels:
    app: grafana
    {{- include "observability-example.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      containers:
      - name: grafana
        image: {{ .Values.grafana.image.repository }}:{{ .Values.grafana.image.tag }}
        ports:
          - containerPort: 3000
            name: grafana-ui
            protocol: TCP
        env:
          - name: GF_PATHS_CONFIG
            value: /etc/grafana/grafana.ini
          - name: GF_PATHS_PROVISIONING
            value: /etc/grafana/provisioning
        volumeMounts:
          - name: grafana-config
            mountPath: /etc/grafana
          - name: grafana-datasources
            mountPath: /etc/grafana/provisioning/datasources
          - name: grafana-storage
            mountPath: /var/lib/grafana
        resources:
          {{- toYaml .Values.grafana.resources | nindent 10 }}
        readinessProbe:
          httpGet:
            path: /api/health
            port: 3000
          initialDelaySeconds: 10
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /api/health
            port: 3000
          initialDelaySeconds: 30
          periodSeconds: 20
      volumes:
        - name: grafana-config
          configMap:
            name: grafana-config
        - name: grafana-datasources
          configMap:
            name: grafana-datasources
        - name: grafana-storage
          emptyDir: {}
{{- end }}
