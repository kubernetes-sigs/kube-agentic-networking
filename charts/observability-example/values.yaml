collector:
  enabled: true
  image:
    repository: otel/opentelemetry-collector-contrib
    tag: "0.122.1"
  resources:
    limits:
      memory: 512Mi
      cpu: 500m
    requests:
      memory: 256Mi
      cpu: 200m
  # Override to point at an external Tempo instance.
  # Defaults to tempo.<release-namespace>.svc.cluster.local:4317
  tempoEndpoint: ""

tempo:
  enabled: true
  image:
    repository: grafana/tempo
    tag: "2.3.1"
  resources:
    limits:
      memory: 1Gi
      cpu: 500m
    requests:
      memory: 512Mi
      cpu: 200m
  retention: 1h

grafana:
  enabled: true
  image:
    repository: grafana/grafana
    tag: "10.2.3"
  resources:
    limits:
      memory: 512Mi
      cpu: 500m
    requests:
      memory: 256Mi
      cpu: 100m
  adminUser: admin
  adminPassword: admin
